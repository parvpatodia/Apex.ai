<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no"/>
<title>Laksh.ai // Oracle Engine</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Roboto+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing:border-box; }
  html,body,#root { height:100%; }
  body  { font-family:'Inter',sans-serif; background:#07080B; color:#F9FAFB; margin:0; padding:0; overflow-x:hidden; }
  .mono { font-family:'Roboto Mono',monospace; }

  /* Scrollbar */
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:#1F222E; border-radius:4px; }
  ::-webkit-scrollbar-thumb:hover { background:#2D3147; }

  /* Glow text effects */
  .glow-cyan  { text-shadow:0 0 24px rgba(0,229,255,.75); }
  .glow-green { text-shadow:0 0 24px rgba(57,255,20,.75);  }

  /* Pulse dot */
  @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.75)} }
  .pulse-dot { animation:pulse-dot 2s ease-in-out infinite; }

  /* Scanlines on video */
  .scanlines::after {
    content:''; position:absolute; inset:0; pointer-events:none; z-index:4;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);
  }

  /* Smooth page transitions */
  .page-enter { animation:pageFade .4s ease; }
  @keyframes pageFade { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

  /* Card hover */
  .metric-card { transition:border-color .3s, box-shadow .3s, transform .3s; cursor:default; }
  .metric-card:hover { border-color:rgba(57,255,20,.35)!important; transform:translateY(-2px);
                       box-shadow:0 8px 32px rgba(57,255,20,.07); }

  /* Metric tooltip info icon — hover for discoverability */
  .metric-info-btn:hover { color: #00E5FF !important; }
  .metric-info-btn { color:#6B7280; transition:color .2s; }
  .metric-info-btn:hover { color:#00E5FF; }
  .metric-info-btn:hover { color:#00E5FF; }

  /* Premium Glassmorphism */
  .glass-panel {
    background: rgba(18, 20, 28, 0.6);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.05);
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
  }

  /* Loading spinner */
  @keyframes spin { to{transform:rotate(360deg)} }
  .spin { animation:spin 1s linear infinite; }

  /* Drag zone */
  .drag-active { border-color:#00E5FF!important; background:rgba(0,229,255,.04)!important; }

  /* Nav link */
  .nav-link { transition:color .2s; padding:.5rem 1.25rem; border-radius:.5rem; font-weight:600; letter-spacing:.08em; text-transform:uppercase; font-size:.9rem; }
  .nav-link:hover { color:#00E5FF; background:rgba(0,229,255,.06); }
  .nav-link.active { color:#00E5FF; border-bottom:2px solid #00E5FF; }

  /* Toast */
  @keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .toast-anim { animation:slideUp .25s ease; }

  /* Video glow */
  .video-wrap { box-shadow:0 0 60px rgba(0,229,255,.06),0 0 0 1px #1F222E; }

  /* Button styles */
  .btn-primary {
    background:transparent; border:1.5px solid rgba(57,255,20,.5); color:#39FF14;
    box-shadow:0 0 0 1px rgba(57,255,20,.15),0 0 24px rgba(57,255,20,.08);
    transition:all .25s; cursor:pointer; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
  }
  .btn-primary:hover { background:rgba(57,255,20,.08); border-color:#39FF14; box-shadow:0 0 30px rgba(57,255,20,.18); }
  .btn-primary:disabled { opacity:.4; cursor:not-allowed; }
  .btn-secondary {
    background:transparent; border:1.5px solid rgba(0,229,255,.3); color:#00E5FF;
    transition:all .25s; cursor:pointer; font-weight:600; letter-spacing:.1em; text-transform:uppercase;
  }
  .btn-secondary:hover { background:rgba(0,229,255,.07); border-color:#00E5FF; }
  .btn-ghost {
    background:transparent; border:1px solid #1F222E; color:#6B7280;
    transition:all .2s; cursor:pointer; font-weight:600; letter-spacing:.08em; text-transform:uppercase;
  }
  .btn-ghost:hover { border-color:rgba(0,229,255,.3); color:#00E5FF; }

  /* Desktop: subtle scale; Mobile: no zoom, full layout */
  @media (min-width: 1024px) {
    body { zoom: 0.9; }
  }
  @media (max-width: 768px) {
    body { zoom: 1; }
  }

  /* Metric cards: 1–2 cols on narrow, extra row gap for tooltip clearance */
  .metric-grid { display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(min(100%, 280px), 1fr)); }
  @media (max-width: 640px) {
    .metric-grid { grid-template-columns: 1fr; gap: 24px; }
  }

  /* Oracle: stack columns on mobile */
  .oracle-main { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 320px), 1fr)); gap: 48px; }
  @media (max-width: 767px) {
    .oracle-main { grid-template-columns: 1fr; gap: 32px; }
  }

  /* Nav: collapse to icons or horizontal scroll on small */
  @media (max-width: 640px) {
    .nav-links { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 4px; }
  }

  /* Radar: shrink on mobile to avoid dominating viewport */
  @media (max-width: 767px) {
    .radar-container { height: 320px !important; padding: 1rem !important; }
  }
</style>
</head>

     align-items:center;justify-content:center;gap:20px;z-index:9999">

<div id="root"></div>

<!-- Babel for JSX -->
<script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>

<script type="text/babel">
const { useState, useRef, useEffect, useCallback, useMemo } = React;
// Automatically use the current domain (localhost for testing, Railway for production)
const API = window.location.origin;

// Parse **bold** markdown from Gemini into neon cyan spans (escape HTML for safety)
const escapeHtml = (s) => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const formatRichText = (text) => {
  if (!text) return '';
  return text.split('**').map((part, i) => {
    const safe = escapeHtml(part);
    return i % 2 === 1 ? `<strong class="mono" style="color:#00E5FF;font-weight:700">${safe}</strong>` : safe;
  }).join('');
};

// ══════════════════════════════════════════════════════════════
//  HASH ROUTER  — real URL navigation, no library needed
// ══════════════════════════════════════════════════════════════
const ROUTES = { HOME:'#/', BIOMECHANICS:'#/biomechanics', ORACLE:'#/oracle-match' };

const useRouter = () => {
  const getHash = () => window.location.hash || '#/';
  const [route, setRoute] = useState(getHash);
  useEffect(() => {
    const h = () => setRoute(window.location.hash || '#/');
    window.addEventListener('hashchange', h);
    return () => window.removeEventListener('hashchange', h);
  }, []);
  const navigate = path => { window.location.hash = path; };
  return { route, navigate };
};

// ══════════════════════════════════════════════════════════════
//  CONSTANTS + METRIC TOOLTIPS (scientific context for trust)
// ══════════════════════════════════════════════════════════════
const METRICS = [
  { key:'release_velocity_mps', label:'Release Velocity', unit:'m/s'  },
  { key:'shot_arc_deg',         label:'Shot Arc',         unit:'°'    },
  { key:'knee_angle',           label:'Knee Flexion',     unit:'°'    },
  { key:'elbow_angle',          label:'Elbow Flexion',    unit:'°'    },
  { key:'hip_rotation_deg',     label:'Hip Rotation',     unit:'°'    },
  { key:'kinetic_sync_ms',      label:'Kinetic Sync',     unit:'ms'   },
  { key:'balance_index',        label:'Balance Index',    unit:'/100' },
  { key:'fluidity_score',       label:'Fluidity Score',   unit:'/100' },
];

// Scientific context for each metric — builds user trust, elevates platform
const METRIC_TOOLTIPS = {
  release_velocity_mps: { what:'Estimated ball release speed from wrist trajectory and limb length scaling.', why:'Higher velocity improves range and shot consistency. NBA guards avg 7–9 m/s.', ideal:'7–9 m/s', limitation:'Derived from 2D motion; true 3D would require calibrated cameras.' },
  shot_arc_deg: { what:'Angle of the shooting arm (shoulder→wrist) at release, or post-release flight path.', why:'45–55° optimizes entry angle and reduces rim rejection. Too flat = bricks.', ideal:'45–55°', limitation:'Side-view can compress apparent arc; 45° offset improves accuracy.' },
  knee_angle: { what:'Knee flexion at the dip phase (hip–knee–ankle angle).', why:'Moderate dip (140–165°) loads lower body for power transfer without excessive crouch.', ideal:'140–165°', limitation:'MediaPipe 3D; occlusion or angle can introduce ±5–10° error.' },
  elbow_angle: { what:'Elbow flexion at release (shoulder–elbow–wrist angle).', why:'Proper alignment (160–180°) ensures straight shot and repeatability.', ideal:'165–178°', limitation:'Single-camera estimates; lab goniometers are ground truth.' },
  hip_rotation_deg: { what:'Torso twist: shoulder line vs hip line at the dip.', why:'Slight rotation (5–15°) supports one-motion flow; excess reduces consistency.', ideal:'5–15°', limitation:'Sensitive to camera angle; best from 45° offset view.' },
  kinetic_sync_ms: { what:'Time from dip (lowest wrist) to release (highest wrist).', why:'Short sync (120–250 ms) indicates efficient one-motion shot.', ideal:'120–250 ms', limitation:'Frame-rate dependent; 30 fps ≈ ±33 ms granularity.' },
  balance_index: { what:'Hip–ankle alignment: how centered mass is over base.', why:'High score (85+) = stable base; leaning reduces power and accuracy.', ideal:'85–99', limitation:'2D projection; true CoM requires force plates.' },
  fluidity_score: { what:'Smoothness of wrist path from dip to release (low jerk).', why:'Fluid motion = repeatable mechanics; jerky = inconsistent release.', ideal:'75–99', limitation:'Sensitive to pose noise; Savitzky–Golay filtering applied.' },
};

const COMPARE = [
  { label:'Shot Arc',      uk:'shot_arc_deg',         pv:45,  mx:60,  dk:'arc_gap'   },
  { label:'Release Vel',   uk:'release_velocity_mps', pv:8.2, mx:12,  dk:'vel_gap'   },
  { label:'Knee Flexion',  uk:'knee_angle',            pv:150, mx:180, dk:'knee_gap'  },
  { label:'Elbow Flexion', uk:'elbow_angle',           pv:165, mx:180, dk:'elbow_gap' },
  { label:'Fluidity',      uk:'fluidity_score',        pv:85,  mx:100, dk:'fluid_gap' },
  { label:'Hip Rotation',  uk:'hip_rotation_deg',      pv:5,   mx:45,  dk:'hip_gap'   },
  { label:'Kinetic Sync',  uk:'kinetic_sync_ms',       pv:150, mx:300, dk:'ksync_gap' },
  { label:'Balance',       uk:'balance_index',         pv:80,  mx:100, dk:'bal_gap'   },
];

const CAT_COLOR = cat => {
  const lc=(cat||'').toLowerCase();
  if(lc.includes('lower')||lc.includes('knee'))      return '#39FF14';
  if(lc.includes('upper')||lc.includes('alignment')) return '#bf00ff';
  if(lc.includes('kinematic')||lc.includes('fluid')) return '#ff003c';
  return '#00E5FF';
};

// ══════════════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════════════
const fmt = v => v!=null&&v!==''&&!isNaN(v)
  ? typeof v==='number'?(Number.isInteger(v)?v:+v.toFixed(2)):v : '—';
const pct   = (v,mx) => Math.min(100,Math.max(0,((v||0)/mx)*100));
const norm  = (v,mx) => Math.min(((Math.abs(v||0))/mx)*100,100);
const fmtT  = s => {
  if (s == null || s === '') return '00:00';
  const n = typeof s === 'string' ? parseFloat(s) : s;
  if (isNaN(n) || n < 0) return '00:00';
  const m = Math.floor(n / 60), sec = Math.floor(n % 60);
  return `${m < 10 ? '0' : ''}${m}:${sec < 10 ? '0' : ''}${sec}`;
};

// ══════════════════════════════════════════════════════════════
//  SVG ICONS
// ══════════════════════════════════════════════════════════════
const I = (d,vb='0 0 24 24') => ({sz=20,cl='',st={}}) => (
  <svg width={sz} height={sz} viewBox={vb} fill="none" stroke="currentColor"
       strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={cl} style={st}>
    {d}
  </svg>
);
const IcoZap    = I(<><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></>);
const IcoMic    = I(<><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></>);
const IcoDB     = I(<><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></>);
const IcoPlay   = ({sz=24}) => <svg width={sz} height={sz} viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
const IcoPause  = ({sz=24}) => <svg width={sz} height={sz} viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>;
const IcoX      = I(<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>);
const IcoUpload = I(<><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></>);
const IcoArrow  = I(<><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></>);
const IcoSpark  = I(<><path d="M12 2L14.85 9.15 22 12 14.85 14.85 12 22 9.15 14.85 2 12 9.15 9.15Z"/></>);
const IcoInfo   = I(<><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></>);

// ══════════════════════════════════════════════════════════════
//  METRIC CARD WITH TOOLTIP — modal overlay (no overlap with bottom cards)
// ══════════════════════════════════════════════════════════════
const MetricCardWithTooltip = ({ m, value, tooltip }) => {
  const [show, setShow] = useState(false);
  const tt = tooltip || METRIC_TOOLTIPS[m.key];
  const hasTooltip = !!tt;
  return (
    <>
      <div className="metric-card glass-panel" style={{position:'relative',borderRadius:'20px',padding:'2rem',
          display:'flex',flexDirection:'column',gap:'12px'}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:'8px'}}>
          <span className="mono" style={{fontSize:'13px',color:'#6B7280',letterSpacing:'.18em',textTransform:'uppercase',fontWeight:700}}>
            {m.label}
          </span>
          {hasTooltip && (
            <button type="button" className="metric-info-btn" onClick={()=>setShow(true)}
              style={{background:'none',border:'none',cursor:'pointer',padding:'4px',flexShrink:0,color:'#6B7280'}}
              aria-label="Learn about this metric" aria-expanded={show}>
              <IcoInfo sz={18} st={{color:'currentColor'}}/>
            </button>
          )}
        </div>
        <p className="mono" style={{fontSize:'clamp(2.5rem, 5vw, 4rem)',fontWeight:700,lineHeight:1,color:'#fff',margin:0}}>
          {fmt(value)}{' '}
          <span style={{fontSize:'1.1rem',color:'#374151',fontWeight:400,marginLeft:'6px'}}>{m.unit}</span>
        </p>
      </div>
      {/* Modal overlay — avoids overlap with cards below */}
      {hasTooltip && show && (
        <div role="dialog" aria-modal="true" aria-labelledby="metric-tooltip-title"
          style={{position:'fixed',inset:0,zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',padding:'1rem',
            background:'rgba(0,0,0,.7)',backdropFilter:'blur(8px)'}}
          onClick={()=>setShow(false)}>
          <div style={{maxWidth:'min(420px, 95vw)',maxHeight:'85vh',overflowY:'auto',
            background:'rgba(18,20,28,0.98)',border:'1px solid #1F222E',borderRadius:'16px',padding:'24px',
            boxShadow:'0 24px 64px rgba(0,0,0,.6)',fontSize:'14px',lineHeight:1.6,color:'#D1D5DB',textAlign:'left'}}
            onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}}>
              <p id="metric-tooltip-title" className="mono" style={{fontSize:'14px',color:'#00E5FF',letterSpacing:'.15em',margin:0}}>{m.label}</p>
              <button type="button" onClick={()=>setShow(false)} style={{background:'none',border:'none',cursor:'pointer',padding:'4px'}} aria-label="Close">
                <IcoX sz={20} st={{color:'#6B7280'}}/>
              </button>
            </div>
            <p style={{margin:'0 0 8px',color:'#00E5FF',fontWeight:600,fontSize:'12px'}}>What</p>
            <p style={{margin:'0 0 14px'}}>{tt.what}</p>
            <p style={{margin:'0 0 8px',color:'#39FF14',fontWeight:600,fontSize:'12px'}}>Why it matters</p>
            <p style={{margin:'0 0 14px'}}>{tt.why}</p>
            <p style={{margin:'0 0 8px',color:'#9CA3AF',fontWeight:600,fontSize:'12px'}}>Ideal range</p>
            <p style={{margin:'0 0 14px'}}>{tt.ideal}</p>
            <p style={{margin:0,color:'#6B7280',fontSize:'11px'}}>Limitation: {tt.limitation}</p>
          </div>
        </div>
      )}
    </>
  );
};

// Inline tooltip for Oracle COMPARE labels — same scientific context
const InlineMetricTooltip = ({ metricKey }) => {
  const [show, setShow] = useState(false);
  const tt = METRIC_TOOLTIPS[metricKey];
  if (!tt) return null;
  return (
    <span style={{position:'relative',display:'inline-flex'}}>
      <button type="button" onMouseEnter={()=>setShow(true)} onMouseLeave={()=>setShow(false)}
        onClick={()=>setShow(!show)} style={{background:'none',border:'none',cursor:'pointer',padding:'2px'}}
        aria-label="Metric info" aria-expanded={show}>
        <IcoInfo sz={14} st={{color:show?'#00E5FF':'#6B7280'}}/>
      </button>
      {show && (
        <div role="tooltip" style={{position:'absolute',left:0,top:'100%',marginTop:'6px',zIndex:60,minWidth:'260px',
          background:'rgba(18,20,28,0.98)',backdropFilter:'blur(12px)',border:'1px solid #1F222E',
          borderRadius:'10px',padding:'12px',boxShadow:'0 12px 40px rgba(0,0,0,.5)',
          fontSize:'12px',lineHeight:1.5,color:'#D1D5DB',textAlign:'left'}}
          onMouseEnter={()=>setShow(true)} onMouseLeave={()=>setShow(false)}>
          <p style={{margin:'0 0 6px',color:'#00E5FF',fontWeight:600,fontSize:'11px'}}>What:</p>
          <p style={{margin:'0 0 8px',fontSize:'11px'}}>{tt.what}</p>
          <p style={{margin:'0 0 6px',color:'#39FF14',fontWeight:600,fontSize:'11px'}}>Why:</p>
          <p style={{margin:'0 0 8px',fontSize:'11px'}}>{tt.why}</p>
          <p style={{margin:'0 0 6px',color:'#9CA3AF',fontWeight:600,fontSize:'11px'}}>Ideal:</p>
          <p style={{margin:'0 0 8px',fontSize:'11px'}}>{tt.ideal}</p>
          <p style={{margin:'0 0 0',color:'#6B7280',fontSize:'10px'}}>Limitation: {tt.limitation}</p>
        </div>
      )}
    </span>
  );
};

// ══════════════════════════════════════════════════════════════
//  LARGE SVG RADAR CHART (no Recharts dependency)
// ══════════════════════════════════════════════════════════════
const SvgRadar = ({ userData, proData, labels, proName, size=400 }) => {
  const cx=size/2, cy=size/2, maxR=size*0.38;
  const n=labels.length;
  const angle = i => (i/n)*Math.PI*2 - Math.PI/2;
  const pt = (r,i) => ({ x:cx+r*Math.cos(angle(i)), y:cy+r*Math.sin(angle(i)) });
  const toPath = data => data.map((v,i)=>{
    const r=((v||0)/100)*maxR, p=pt(r,i);
    return `${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`;
  }).join(' ')+' Z';

  return (
    <svg width="100%" viewBox={`0 0 ${size} ${size}`} style={{overflow:'visible',maxWidth:`${size}px`}}>
      {/* Grid rings */}
      {[25,50,75,100].map(r=>(
        <circle key={r} cx={cx} cy={cy} r={r*maxR/100}
          fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="1"/>
      ))}
      {/* Axes */}
      {labels.map((_,i)=>{
        const o=pt(maxR,i);
        return <line key={i} x1={cx} y1={cy} x2={o.x} y2={o.y}
          stroke="rgba(255,255,255,0.07)" strokeWidth="1"/>;
      })}
      {/* Pro area */}
      <path d={toPath(proData)}  fill="rgba(0,229,255,.11)"  stroke="#00E5FF" strokeWidth="2.5"/>
      {/* User area */}
      <path d={toPath(userData)} fill="rgba(57,255,20,.14)"  stroke="#39FF14" strokeWidth="2.5"/>
      {/* Pro dots */}
      {proData.map((v,i)=>{
        const p=pt(((v||0)/100)*maxR,i);
        return <circle key={i} cx={p.x} cy={p.y} r="5" fill="#00E5FF"
          style={{filter:'drop-shadow(0 0 4px #00E5FF)'}}/>;
      })}
      {/* User dots */}
      {userData.map((v,i)=>{
        const p=pt(((v||0)/100)*maxR,i);
        return <circle key={i} cx={p.x} cy={p.y} r="6" fill="#39FF14"
          style={{filter:'drop-shadow(0 0 5px #39FF14)'}}/>;
      })}

                              <div style={{display:'flex', alignItems:'baseline', gap:'8px'}}>

                  <div>
                    <h4 style={{fontSize:'1.5rem',fontWeight:800,marginBottom:'12px', color:'#fff'}}>

// ══════════════════════════════════════════════════════════════
//  APP ROOT — all state lives here
// ══════════════════════════════════════════════════════════════
const App = () => {
  const { route, navigate } = useRouter();

  // Global state
  const [athleteName,  setAthleteName]  = useState('');
  const [videoFile,    setVideoFile]    = useState(null);
  const [videoObjUrl,  setVideoObjUrl]  = useState(null);
  const [isAnalyzing,  setIsAnalyzing]  = useState(false);
  const [data,         setData]         = useState(null);
  const [assetImg,     setAssetImg]     = useState(null);
  const [assetStatus,  setAssetStatus]  = useState('AWAITING SYNTHESIS');
  const [isGenAsset,   setIsGenAsset]   = useState(false);
  const [showMeta,     setShowMeta]     = useState(false);
  const [toast,        setToast]        = useState('');

  // Video & canvas refs — live here so they persist across route changes
  const videoRef  = useRef(null);
  const canvasRef = useRef(null);
  const rafRef    = useRef(null);
  const telRef    = useRef(null);

  useEffect(() => {
    telRef.current = data?.telemetry?.dip ? data.telemetry : null;
  }, [data]);

  // Load video src when object URL changes
  useEffect(() => {
    const v = videoRef.current;
    if (!v || !videoObjUrl) return;
    v.src = videoObjUrl;
    v.load();
  }, [videoObjUrl]);

  // Canvas rAF skeleton loop — per-frame MediaPipe overlay with smooth interpolation
  useEffect(() => {
    const drawSkel = (ctx, canvas, video, joints, color) => {
      if (!joints?.wrist || !joints?.shoulder) return;
      const vw=video.videoWidth, vh=video.videoHeight;
      if (!vw||!vh) return;
      const vr=vw/vh, cr=canvas.width/canvas.height;
      let rw=canvas.width, rh=canvas.height, ox=0, oy=0;
      if (vr>cr) { rh=canvas.width/vr; oy=(canvas.height-rh)/2; }
      else       { rw=canvas.height*vr; ox=(canvas.width-rw)/2;  }
      const c = j => {
        const x=ox+(Number(j[0])||0)*rw, y=oy+(Number(j[1])||0)*rh;
        return {x, y};
      };
      const [w,e,s,h,k,a] = [c(joints.wrist),c(joints.elbow),c(joints.shoulder),
                              c(joints.hip),c(joints.knee),c(joints.ankle)];
      const pts=[w,e,s,h,k,a];
      const valid=pts.every(p=>!isNaN(p.x)&&!isNaN(p.y));
      if (!valid) return;
      // Glow layer
      ctx.shadowColor=color; ctx.shadowBlur=14;
      ctx.beginPath();
      ctx.moveTo(w.x,w.y); ctx.lineTo(e.x,e.y); ctx.lineTo(s.x,s.y);
      ctx.lineTo(h.x,h.y); ctx.lineTo(k.x,k.y); ctx.lineTo(a.x,a.y);
      ctx.strokeStyle=color; ctx.lineWidth=6; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.stroke();
      ctx.shadowBlur=0;
      // Core stroke
      ctx.strokeStyle=color; ctx.lineWidth=4; ctx.stroke();
      pts.forEach(p=>{
        ctx.beginPath(); ctx.arc(p.x,p.y,7,0,2*Math.PI);
        ctx.fillStyle='#0a0a0f'; ctx.fill();
        ctx.strokeStyle=color; ctx.lineWidth=3; ctx.stroke();
      });
    };
    const getJointsForTime = (tel, t) => {
      const frames=tel.frames;
      if (Array.isArray(frames)&&frames.length>0) {
        const dip=tel.dip?.time_sec??0, rel=tel.release?.time_sec??dip+1;
        const start=dip-0.05, end=rel+1.5;
        if (t<start||t>end) return null;
        let best=null, bestDiff=Infinity;
        for (const f of frames) {
          const d=Math.abs(f.time_sec-t);
          if (d<bestDiff) { bestDiff=d; best=f.joints; }
        }
        return best;
      }
      if (tel.dip&&tel.release) {
        const dip=tel.dip.time_sec, rel=tel.release.time_sec;
        if (t>=dip-0.1&&t<rel) return tel.dip.joints;
        if (t>=rel&&t<rel+1.5) return tel.release.joints;
      }
      return null;
    };
    const loop = () => {
      rafRef.current = requestAnimationFrame(loop);
      const video=videoRef.current, canvas=canvasRef.current;
      if (!video||!canvas) return;
      const rect=video.getBoundingClientRect();
      if (rect.width===0) return;
      const cw=Math.round(rect.width), ch=Math.round(rect.height);
      if (canvas.width!==cw||canvas.height!==ch) { canvas.width=cw; canvas.height=ch; }
      const tel=telRef.current;
      const ctx=canvas.getContext('2d');
      ctx.clearRect(0,0,canvas.width,canvas.height);
      if (!tel?.dip&&!tel?.frames?.length) return;
      const t=video.currentTime;
      const joints=getJointsForTime(tel,t);
      if (joints) {
        const inRelease=tel.release&&t>=tel.release.time_sec&&t<tel.release.time_sec+1.5;
        drawSkel(ctx,canvas,video,joints,inRelease?'#00E5FF':'#39FF14');
      }
    };
    rafRef.current = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(rafRef.current);
  }, []);

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(''),3500); };

  const handleFileSelect = useCallback(file => {
    // SECURITY: Enforce 50MB file size limit to protect cloud server RAM
    const MAX_FILE_SIZE = 50 * 1024 * 1024; // 50 Megabytes in bytes
    
    if (file && file.size > MAX_FILE_SIZE) {
      showToast('⚠️ Video exceeds 50MB limit. Please trim your clip.');
      return; // Abort the upload process
    }

    if (videoObjUrl) URL.revokeObjectURL(videoObjUrl);
    setVideoFile(file);
    setVideoObjUrl(URL.createObjectURL(file));
  }, [videoObjUrl]);

  const handleExecute = useCallback(async () => {
    if (!videoFile) { showToast('Select a video first.'); return; }
    setIsAnalyzing(true);
    navigate(ROUTES.BIOMECHANICS);
    try {
      const form = new FormData();
      form.append('video', videoFile);
      const r = await fetch(`${API}/analyze-video`, { method:'POST', body:form });
      const d = await r.json();
      if (!r.ok) throw new Error(d.detail || d.message || 'Analysis failed');
      setData(d);
    } catch (e) {
      showToast(`Oracle failed: ${e.message}`);
    }
    setIsAnalyzing(false);
  }, [videoFile]);

  const handleAudio = useCallback(async () => {
    const fb = data?.athlete_feedback;
    let text = data?.scout_report || '';
    if (Array.isArray(fb)) text = fb.map(i=>i.observation||'').join('. ');
    if (!text) { showToast('Run Oracle first.'); return; }

    // EXTREME SANITIZATION: Strip asterisks, underscores, and newlines so the TTS speaks fluidly
    const cleanText = text.replace(/[*_]/g, '').replace(/\n/g, ' ');

    try {
      const r = await fetch(`${API}/generate-audio-brief`, {
        method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({text: cleanText}),
      });
      const d = await r.json();
      if (d.status==='success'&&d.audio_base64) new Audio(`data:audio/mp3;base64,${d.audio_base64}`).play();
      else showToast(d.message||'Audio failed.');
    } catch (e) { showToast(`Audio: ${e.message}`); }
  }, [data]);

  // ── 4D Asset — hyper-personalized data card ───────────────────
  const handleGenAsset = useCallback(async () => {
    setIsGenAsset(true); setAssetImg(null); setAssetStatus('SYNTHESIZING LAKSH.AI SIGNATURE FOR USER...');
    try {
      const r = await fetch(`${API}/generate-metric-card`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          match: data?.pro_match,
          arc: data?.stats?.shot_arc_deg,
          vel: data?.stats?.release_velocity_mps,
        }),
      });
      const d = await r.json();
      console.log('Imagen response:', d);
      // ── Explicit Data URI construction (the fix) ──
      if (d.status === 'success' && d.image_base64) {
        const imgSrc = `data:image/jpeg;base64,${d.image_base64}`;
        setAssetImg(imgSrc);
        setAssetStatus('');
      } else if (d.image_base64) {
        // SVG fallback from backend placeholder
        setAssetImg(`data:image/svg+xml;base64,${d.image_base64}`);
        setAssetStatus('');
      } else {
        setAssetStatus(`Failed: ${d.message || 'No image data returned'}`);
      }
    } catch (e) {
      console.error('4D error:', e);
      setAssetStatus('Network error during synthesis');
    }
    setIsGenAsset(false);
  }, [data]);

  const metaPayload = useMemo(() => ({
    timestamp: new Date().toISOString(),
    engine:    'Laksh.ai Oracle v7 — Cosine Space',
    telemetry: telRef.current||{},
    stats:     data?.stats||{},
    deltas:    data?.kinematic_deltas||{},
    pro:       data?.matched_pro||{},
  }), [data, showMeta]);

  const s = data?.stats || {};
  const isHome = route === ROUTES.HOME || route === '#/' || route === '';
  const isBio  = route === ROUTES.BIOMECHANICS;
  const isOracle = route === ROUTES.ORACLE;

  return (
    <div style={{minHeight:'100vh',background:'#07080B'}}>
      {/* Persistent navbar */}
      <TopNav route={route} navigate={navigate} videoFile={videoFile}
              isAnalyzing={isAnalyzing} onExecute={handleExecute} analysisData={data}
              onAudio={handleAudio} onMeta={()=>setShowMeta(true)}/>

      {/* PAGES — all mounted, controlled by display to keep video alive */}
      {isHome   && <IngestionPage videoFile={videoFile} onFileSelect={handleFileSelect}
                     onExecute={handleExecute} isAnalyzing={isAnalyzing} navigate={navigate}
                     athleteName={athleteName} setAthleteName={setAthleteName}/>}

      {/* Biomechanics page — always mounted when video loaded, hidden otherwise */}
      <div style={{display: isBio ? 'block' : 'none'}}>
        <BiomechanicsPage stats={s} videoRef={videoRef} canvasRef={canvasRef}
                          videoObjectUrl={videoObjUrl} isVisible={isBio}
                          detectionMetadata={data?.detection_metadata}
                          validationWarnings={data?.validation_warnings}/>
      </div>

      {isOracle && <OracleMatchPage stats={s} proMatch={data?.pro_match}
                     matchedPro={data?.matched_pro} deltas={data?.kinematic_deltas}
                     feedback={data?.athlete_feedback} scoutReport={data?.scout_report}
                     assetImg={assetImg} assetStatus={assetStatus}
                     onGenAsset={handleGenAsset} isGenAsset={isGenAsset}
                     confidence={data?.confidence} athleteName={athleteName}
                     wittyCatchphrase={data?.witty_catchphrase}
                     validationWarnings={data?.validation_warnings}/>}

      <MetaModal open={showMeta} onClose={()=>setShowMeta(false)} payload={metaPayload}/>
      <Toast msg={toast}/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
document.getElementById('apex-loader').style.display = 'none';
</script>
</body>
</html>
